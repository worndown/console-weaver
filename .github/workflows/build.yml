name: Build and Test

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore ConsoleWeaver.slnx

    - name: Build
      run: dotnet build ConsoleWeaver.slnx --configuration Release --no-restore

    - name: Test
      run: dotnet test ConsoleWeaver.slnx --configuration Release --no-build --verbosity normal

    - name: Pack NuGet package
      if: matrix.os == 'ubuntu-latest'
      run: dotnet pack src/ConsoleWeaver/ConsoleWeaver.csproj --configuration Release --no-build --output ./artifacts

    - name: Upload NuGet package artifact
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package
        path: ./artifacts/*.nupkg
        retention-days: 30
