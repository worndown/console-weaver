name: Release to NuGet

on:
  release:
    types: [published]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

    - name: Restore dependencies
      run: dotnet restore ConsoleWeaver.slnx

    - name: Build
      run: dotnet build ConsoleWeaver.slnx --configuration Release --no-restore

    - name: Test
      run: dotnet test ConsoleWeaver.slnx --configuration Release --no-build --verbosity normal

    - name: Pack NuGet package
      run: dotnet pack src/ConsoleWeaver/ConsoleWeaver.csproj --configuration Release --no-build --output ./artifacts -p:Version=${{ steps.version.outputs.VERSION }}

    - name: Publish to NuGet
      run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
